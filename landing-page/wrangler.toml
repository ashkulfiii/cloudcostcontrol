# Cloudflare Worker Configuration for C³ - Cloud Cost Control Landing Page

name = "cloudcost-control-landing"
main = "worker.js"
compatibility_date = "2024-12-01"

# Enable workers.dev subdomain
workers_dev = true

# Routes for custom domain
[[routes]]
pattern = "cloudcostcontrol.net/*"
zone_name = "cloudcostcontrol.net"

[[routes]]
pattern = "www.cloudcostcontrol.net/*"
zone_name = "cloudcostcontrol.net"

# Static assets
[site]
bucket = "./dist"

# Environment variables
[vars]
# Add any environment variables here if needed

# Production environment
[env.production]
name = "cloudcost-control-landing-prod"
routes = [
  { pattern = "cloudcostcontrol.net", zone_name = "cloudcostcontrol.net", custom_domain = true },
  { pattern = "www.cloudcostcontrol.net", zone_name = "cloudcostcontrol.net", custom_domain = true }
]

[env.production.vars]
# Production-specific environment variables
