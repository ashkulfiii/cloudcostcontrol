# Cloudflare Workers Configuration for C³ - Cloud Cost Control Form Handler

name = "cloudcost-control-form-handler"
main = "index.js"
compatibility_date = "2024-12-01"

# Environment variables (set these in Cloudflare Dashboard)
[vars]
# These will be set in the Cloudflare Workers dashboard
# SENDGRID_API_KEY = "your-sendgrid-api-key"
# MAILGUN_API_KEY = "your-mailgun-api-key"  
# MAILGUN_DOMAIN = "your-mailgun-domain"

# Optional: D1 Database binding (uncomment if you want to store submissions)
# [[d1_databases]]
# binding = "DB"
# database_name = "cloudcost-control-forms"
# database_id = "your-d1-database-id"

# Routes (replace with your actual domain)
[[routes]]
pattern = "cloudcostcontrol.net/api/contact"
zone_name = "cloudcostcontrol.net"
