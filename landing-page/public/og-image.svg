      <path d="M86 66v12m0 36v12m-12-48c0-3.6 2.4-6 6-6h12c3.6 0 6 2.4 6 6s-2.4 6-6 6h-12c-3.6 0-6-2.4-6-6zm0 24c0 3.6 2.4 6 6 6h12c3.6 0 6-2.4 6-6s-2.4-6-6-6h-12c-3.6 0-6 2.4-6 6z" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" fill="none"/>
      
      <!-- Downward trending arrow -->
      <path d="M144 156l18-18m0 0l-18-18m18 18h-36" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
      <!-- Main heading -->
    <text x="280" y="100" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">
      C³ - Cloud Cost Control
    </text>
    
    <!-- Subheading -->
    <text x="280" y="160" font-family="Arial, sans-serif" font-size="36" fill="white" opacity="0.9">
      Azure Cost Optimization Services
    </text>
    
    <!-- Key benefits -->
    <g transform="translate(280, 220)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="28" fill="white" opacity="0.8">
        ✓ Cut Azure costs by 30-50%
      </text>
      <text x="0" y="50" font-family="Arial, sans-serif" font-size="28" fill="white" opacity="0.8">
