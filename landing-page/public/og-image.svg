<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Main content container -->
  <g transform="translate(100, 100)">
    
    <!-- Brand logo/icon -->
    <g transform="translate(50, 50)">
      <!-- Cloud shape -->
      <path d="M50 120c-15 0-27-12-27-27 0-13.2 9.6-24 22.2-26.4C50.8 55.8 59 48 69 48c8.4 0 16.2 4.2 21 10.8 4.8-1.8 9.6-3 15-3 19.8 0 36 16.2 36 36 0 4.8-1.2 9-3 13.2 10.8 3 18 12.6 18 24 0 13.2-10.8 24-24 24H50z" fill="#ffffff" opacity="0.9"/>
      
