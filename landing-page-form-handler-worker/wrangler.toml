# Cloudflare Workers Configuration for C³ - Cloud Cost Control Form Handler

name = "cloudcost-control-form-handler"
main = "index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Enable workers.dev subdomain
workers_dev = true

# Email Workers binding for sending notifications
[[send_email]]
name = "SEND_EMAIL"
destination_address = "cloudcostcontrol@proton.me"

# Routes (replace with your actual domain)
[[routes]]
pattern = "cloudcostcontrol.net/api/contact"
zone_name = "cloudcostcontrol.net"

[observability.logs]
enabled = true



